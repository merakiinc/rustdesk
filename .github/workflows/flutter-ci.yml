name: Full Flutter CI

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        description: 'Upload build artifacts'
        type: boolean
        default: false
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact || false }}
